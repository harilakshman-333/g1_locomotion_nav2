# =============================================================================
# nav2_config/nav2_params.yaml
# G1-specific Nav2 parameter file.
#
# Key differences from a wheeled robot:
#  - Lower max speeds (bipedal dynamics, ~0.5 m/s)
#  - Larger footprint (G1 body ~0.6 m wide, 0.3 m deep per side)
#  - Lower update rates (policy runs at 50 Hz; Nav2 controller at 10 Hz is safe)
#  - Slightly higher inflation radius (legs need more clearance than wheels)
# =============================================================================

# ── SLAM Toolbox ──────────────────────────────────────────────────────────────
slam_toolbox:
  ros__parameters:
    # Mode: "mapping" while exploring, "localization" after map is saved
    mode: mapping

    # Topics
    scan_topic: /scan              # output of depthimage_to_laserscan
    odom_frame: odom
    base_frame: base_link
    map_frame:  map

    # Synchronous vs async (async is better for real-time sim)
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI

    use_sim_time: true

    # Map update frequency
    map_update_interval: 0.5      # seconds

    # Resolution
    resolution: 0.05              # 5 cm/cell — good for indoor navigation

    # Max laser range to use
    max_laser_range: 5.0

# ── Lifecycle Manager ─────────────────────────────────────────────────────────
lifecycle_manager:
  ros__parameters:
    autostart: true
    node_names:
      - map_server
      - amcl
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator

# ── Map Server (used in localization mode after map saved) ────────────────────
map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: /maps/sim_map.yaml   # saved by map_saver_cli after mapping

# ── AMCL (localization, used AFTER a map has been built) ─────────────────────
amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: /scan
    # Particle filter settings — tuned for indoor flat-floor humanoid
    min_particles: 500
    max_particles: 2000
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_a: 0.0

# ── Planner Server (global path planning) ─────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.3              # goal tolerance [m]
      use_astar: true             # A* is predictable for humanoid navigation
      allow_unknown: true

# ── Controller Server (local planning — generates /cmd_vel) ───────────────────
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0   # Hz — matches 50 Hz policy with safe margin
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins:    ["goal_checker"]
    controller_plugins:      ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3     # [m]  — reach goal within 30 cm
      yaw_goal_tolerance: 0.25   # [rad]

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      # Velocity limits — conservative for humanoid
      min_vel_x: 0.0
      max_vel_x: 0.5             # m/s — G1 comfortable walking speed
      min_vel_y: -0.2
      max_vel_y:  0.2            # m/s — slight lateral drift
      min_vel_theta: -0.5
      max_vel_theta:  0.5        # rad/s

      # Acceleration limits
      acc_lim_x: 0.3
      acc_lim_y: 0.2
      acc_lim_theta: 0.5

      # Deceleration (humanoid needs extra stopping distance)
      decel_lim_x: -0.5
      decel_lim_y: -0.3
      decel_lim_theta: -0.8

      # Scoring — discourage sharp turns (bipedal efficiency)
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign",
                "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale:  0.02
      PathAlign.scale:     32.0
      PathDist.scale:      32.0
      GoalAlign.scale:     24.0
      GoalDist.scale:      24.0
      RotateToGoal.scale:  32.0

      # Angular granularity (fewer samples → faster compute)
      vtheta_samples: 20
      vx_samples:     20
      vy_samples:     5

# ── Global Costmap ────────────────────────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame:  map
      robot_base_frame: base_link
      update_frequency:  1.0
      publish_frequency: 1.0
      resolution: 0.05

      # G1 footprint (approximate bounding box in metres, centred on base_link)
      # Width ~0.5 m, Depth ~0.35 m per side
      footprint: "[[0.35, 0.25], [0.35, -0.25], [-0.35, -0.25], [-0.35, 0.25]]"
      footprint_padding: 0.05

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55    # [m] — clearance for bipedal gait width

# ── Local Costmap ─────────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame:  odom
      robot_base_frame: base_link
      rolling_window: true
      width:  3
      height: 3
      resolution: 0.05
      update_frequency:  5.0
      publish_frequency: 2.0

      footprint: "[[0.35, 0.25], [0.35, -0.25], [-0.35, -0.25], [-0.35, 0.25]]"

      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55

# ── Behavior Server ───────────────────────────────────────────────────────────
behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"

# ── BT Navigator (behaviour tree that coordinates all Nav2 components) ────────
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # Use the default navigate-to-pose BT
    default_nav_to_pose_bt_xml: ""
